<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoAI - Premium AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: rgba(20, 20, 40, 0.8);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-blue: #00d4ff;
            --neon-purple: #8b5cf6;
            --neon-pink: #ff49db;
            --text-primary: #ffffff;
            --text-secondary: #b4b4b8;
            --accent-gradient: linear-gradient(135deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: rgba(255, 255, 255, 0.9);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.05);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Particle Background */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: var(--accent-gradient);
            background-size: 200% 200%;
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        /* Main Layout */
        .app-container {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 10;
        }

        /* Sidebar */
        .sidebar {
            width: 72px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem 0;
            transition: width 0.3s ease;
            position: relative;
        }

        .sidebar.expanded {
            width: 280px;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 1rem;
            width: 100%;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
        }

        .sidebar.expanded .logo { opacity: 1; }

        .nav-item {
            width: 100%;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-radius: 12px;
            margin: 4px 8px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-item:hover {
            background: var(--glass-bg);
            transform: translateX(4px);
        }

        .nav-item i {
            font-size: 1.2rem;
            width: 20px;
            text-align: center;
        }

        .nav-text {
            opacity: 0;
            font-weight: 500;
        }

        .sidebar.expanded .nav-text { opacity: 1; }

        /* Main Chat Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-header {
            padding: 1rem 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .ai-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .chat-title {
            font-weight: 700;
            font-size: 1.25rem;
        }

        /* Messages Container */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: var(--neon-blue) var(--glass-bg);
        }

        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: var(--glass-bg);
            border-radius: 3px;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--neon-blue);
            border-radius: 3px;
        }

        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 1.5rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        .user-avatar {
            background: var(--accent-gradient);
            color: white;
        }

        .ai-avatar-small {
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            color: white;
        }

        .message-content {
            max-width: 70%;
            padding: 1rem 1.25rem;
            border-radius: 20px;
            position: relative;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .message.user .message-content {
            background: var(--accent-gradient);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .message.ai .message-content {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .message-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .message:hover .message-actions { opacity: 1; }

        .action-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: var(--neon-blue);
            color: white;
            transform: scale(1.1);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 1rem;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .typing-indicator.show {
            opacity: 1;
            transform: translateY(0);
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--neon-blue);
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        /* Input Area */
        .input-area {
            padding: 1.5rem 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .input-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .voice-btn, .emoji-btn, .quick-reply {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .voice-btn:hover, .emoji-btn:hover, .quick-reply:hover {
            background: var(--neon-blue);
            color: white;
            transform: translateY(-2px);
        }

        .message-input {
            flex: 1;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 1rem 1.5rem;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .message-input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .send-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            background: var(--accent-gradient);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4);
        }

        .send-btn:hover {
            transform: scale(1.05) rotate(10deg);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.6);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .modal.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 72px;
            }
            
            .chat-header {
                padding: 1rem;
            }
            
            .messages-container {
                padding: 1rem;
            }
            
            .input-area {
                padding: 1rem;
            }
            
            .message-content {
                max-width: 85%;
            }
        }

        /* Utilities */
        .hidden { display: none !important; }
        .gradient-text {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .notification.show {
            transform: translateX(0);
        }

        /* Code blocks */
        pre {
            background: rgba(0, 0, 0, 0.3) !important;
            border-radius: 12px;
            padding: 1rem;
            margin: 1rem 0;
            overflow-x: auto;
            border: 1px solid var(--glass-border);
        }

        code {
            font-family: 'Monaco', monospace;
            background: rgba(0, 0, 0, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- Particle Background -->
    <canvas id="particles"></canvas>

    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-bars" id="menu-toggle"></i>
                <div class="logo gradient-text">NeoAI</div>
            </div>
            <div class="nav-item active" data-chat="new">
                <i class="fas fa-plus"></i>
                <span class="nav-text">New Chat</span>
            </div>
            <div class="nav-item" data-chat="history">
                <i class="fas fa-history"></i>
                <span class="nav-text">History</span>
            </div>
            <div class="nav-item" data-chat="search">
                <i class="fas fa-search"></i>
                <span class="nav-text">Search</span>
            </div>
            <div class="nav-item" data-theme-toggle>
                <i class="fas fa-moon"></i>
                <span class="nav-text">Theme</span>
            </div>
            <div class="nav-item" data-chat="settings">
                <i class="fas fa-cog"></i>
                <span class="nav-text">Settings</span>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Chat Header -->
            <div class="chat-header">
                <div class="ai-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div>
                    <div class="chat-title gradient-text">NeoAI Assistant</div>
                    <div style="font-size: 0.875rem; color: var(--text-secondary);">Online</div>
                </div>
                <div style="margin-left: auto; display: flex; gap: 8px;">
                    <button class="voice-btn" id="voiceReplyBtn" title="Voice Reply">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <button class="voice-btn" id="clearChatBtn" title="Clear Chat">
                        <i class="fas fa-trash"></i>
                    </button>
                    <button class="voice-btn" id="exportChatBtn" title="Export Chat">
                        <i class="fas fa-download"></i>
                    </button>
                </div>
            </div>

            <!-- Messages Container -->
            <div class="messages-container" id="messagesContainer">
                <div class="message ai">
                    <div class="avatar ai-avatar-small">AI</div>
                    <div class="message-content">
                        <div>Welcome to NeoAI! I'm your premium AI assistant. How can I help you today?</div>
                        <div class="message-time">Just now</div>
                    </div>
                </div>
            </div>

            <!-- Typing Indicator -->
            <div class="typing-indicator" id="typingIndicator">
                <div class="avatar ai-avatar-small">AI</div>
                <div class="message-content">
                    <div>AI is typing</div>
                    <div class="typing-dots">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-controls">
                    <button class="voice-btn" id="voiceInputBtn" title="Voice Input">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <button class="emoji-btn" id="emojiBtn" title="Emoji">
                        <i class="fas fa-smile"></i>
                    </button>
                    <div style="flex: 1;">
                        <input type="text" class="message-input" id="messageInput" placeholder="Type your message...">
                    </div>
                    <button class="send-btn" id="sendBtn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;" id="quickReplies">
                    <button class="quick-reply">Hello</button>
                    <button class="quick-reply">Help me</button>
                    <button class="quick-reply">Write code</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h2 style="margin-bottom: 1.5rem; font-size: 1.5rem; font-weight: 700;">Settings</h2>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                    <input type="checkbox" id="voiceEnabled" checked>
                    <span>Enable Voice Input</span>
                </label>
                <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                    <input type="checkbox" id="ttsEnabled" checked>
                    <span>Enable Text-to-Speech</span>
                </label>
                <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                    <input type="checkbox" id="timestampsEnabled" checked>
                    <span>Show Timestamps</span>
                </label>
                <div>
                    <label>OpenAI API Key:</label>
                    <input type="password" id="apiKeyInput" placeholder="Enter your OpenAI API key" style="width: 100%; margin-top: 8px; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-primary);">
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button class="action-btn" onclick="document.getElementById('settingsModal').classList.remove('show')">Cancel</button>
                    <button class="send-btn" style="width: auto; padding: 12px 24px;" onclick="saveSettings()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <script>
        // Global State
        let chatHistory = [];
        let isTyping = false;
        let recognition = null;
        let synthesis = window.speechSynthesis;
        let currentTheme = 'dark';
        let apiKey = localStorage.getItem('neoai_api_key') || '';

        // DOM Elements
        const sidebar = document.getElementById('sidebar');
        const menuToggle = document.getElementById('menu-toggle');
        const messagesContainer = document.getElementById('messagesContainer');
        const typingIndicator = document.getElementById('typingIndicator');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const voiceInputBtn = document.getElementById('voiceInputBtn');
        const voiceReplyBtn = document.getElementById('voiceReplyBtn');
        const clearChatBtn = document.getElementById('clearChatBtn');
        const exportChatBtn = document.getElementById('exportChatBtn');
        const emojiBtn = document.getElementById('emojiBtn');
        const settingsModal = document.getElementById('settingsModal');
        const notification = document.getElementById('notification');
        const apiKeyInput = document.getElementById('apiKeyInput');

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initParticles();
            initSpeechRecognition();
            loadSettings();
            messageInput.focus();
            apiKeyInput.value = apiKey;
            
            // Event Listeners
            menuToggle.addEventListener('click', toggleSidebar);
            sendBtn.addEventListener('click', sendMessage);
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            voiceInputBtn.addEventListener('click', toggleVoiceInput);
            voiceReplyBtn.addEventListener('click', speakLastMessage);
            clearChatBtn.addEventListener('click', clearChat);
            exportChatBtn.addEventListener('click', exportChat);
            document.querySelector('[data-theme-toggle]').addEventListener('click', toggleTheme);
            document.querySelector('[data-chat="settings"]').addEventListener('click', () => settingsModal.classList.add('show'));
            
            // Quick replies
            document.getElementById('quickReplies').addEventListener('click', (e) => {
                if (e.target.classList.contains('quick-reply')) {
                    messageInput.value = e.target.textContent;
                    sendMessage();
                }
            });
        });

        // Particles Animation
        function initParticles() {
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });

            function createParticle() {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = Math.random() * 4 + 2 + 'px';
                particle.style.height = particle.style.width;
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                document.getElementById('particles').appendChild(particle);

                setTimeout(() => {
                    if (particle.parentNode) {
                        particle.parentNode.removeChild(particle);
                    }
                }, 20000);
            }

            setInterval(createParticle, 300);
        }

        // Sidebar Toggle
        function toggleSidebar() {
            sidebar.classList.toggle('expanded');
        }

        // Send Message
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isTyping) return;

            addMessage('user', message);
            messageInput.value = '';
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            typingIndicator.classList.add('show');

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: chatHistory,
                        max_tokens: 1000,
                        temperature: 0.7
                    })
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                const aiMessage = data.choices[0].message.content;
                
                chatHistory.push({ role: 'user', content: message });
                chatHistory.push({ role: 'assistant', content: aiMessage });

                setTimeout(() => {
                    addMessage('ai', aiMessage);
                }, 500);

            } catch (error) {
                addMessage('ai', `Error: ${error.message}. Please check your API key in settings.`);
                showNotification('API Error: Check your OpenAI API key in settings', 'error');
            } finally {
                isTyping = false;
                typingIndicator.classList.remove('show');
                sendBtn.disabled = false;
                sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
                messageInput.focus();
            }
        }

        // Add Message to Chat
        function addMessage(sender, content) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatar = sender === 'user' 
                ? '<div class="avatar user-avatar">U</div>'
                : '<div class="avatar ai-avatar-small">AI</div>';

            const actions = `
                <div class="message-actions">
                    <button class="action-btn" onclick="copyMessage(this)" title="Copy">
                        <i class="fas fa-copy"></i>
                    </button>
                    <button class="action-btn" onclick="deleteMessage(this)" title="Delete">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `;

            messageDiv.innerHTML = `
                ${sender === 'user' ? '' : avatar}
                <div class="message-content">${parseMarkdown(content)}${actions}</div>
                ${sender === 'user' ? avatar : ''}
                <div class="message-time">${time}</div>
            `;

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            if (sender === 'ai' && document.getElementById('ttsEnabled').checked) {
                speak(content);
            }
        }

        // Parse Markdown (basic)
        function parseMarkdown(text) {
            return text
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color: var(--neon-blue);">$1</a>');
        }

        // Copy Message
        function copyMessage(btn) {
            const content = btn.closest('.message-content').querySelector('div').textContent;
            navigator.clipboard.writeText(content).then(() => {
                showNotification('Message copied!', 'success');
            });
        }

        // Delete Message
        function deleteMessage(btn) {
            btn.closest('.message').remove();
        }

        // Clear Chat
        function clearChat() {
            if (confirm('Clear all messages?')) {
                messagesContainer.innerHTML = '';
                chatHistory = [];
                showNotification('Chat cleared', 'info');
            }
        }

        // Export Chat
        function exportChat() {
            const chatText = Array.from(messagesContainer.querySelectorAll('.message')).map(msg => {
                const sender = msg.querySelector('.avatar')?.textContent || 'User';
                const content = msg.querySelector('.message-content div')?.textContent || '';
                return `${sender}: ${content}`;
            }).join('\n\n');

            const blob = new Blob([chatText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `neoai-chat-${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            showNotification('Chat exported!', 'success');
        }

        // Speech Recognition
        function initSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window)) {
                voiceInputBtn.style.opacity = '0.5';
                return;
            }

            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                messageInput.value = event.results[0][0].transcript;
                sendMessage();
            };

            recognition.onerror = () => {
                showNotification('Voice recognition failed', 'error');
            };
        }

        function toggleVoiceInput() {
            if (recognition) {
                recognition.start();
                voiceInputBtn.innerHTML = '<i class="fas fa-stop"></i>';
                setTimeout(() => {
                    voiceInputBtn.innerHTML = '<i class="fas fa-microphone"></i>';
                }, 5000);
            }
        }

        // Text-to-Speech
        function speak(text) {
            if (synthesis && document.getElementById('ttsEnabled').checked) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.9;
                utterance.pitch = 1.1;
                synthesis.speak(utterance);
            }
        }

        function speakLastMessage() {
            const lastMessage = messagesContainer.lastElementChild?.querySelector('.message-content div')?.textContent;
            if (lastMessage) speak(lastMessage);
        }

        // Theme Toggle
        function toggleTheme() {
            document.body.dataset.theme = currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('neoai_theme', currentTheme);
            showNotification(`Theme switched to ${currentTheme}`, 'info');
        }

        // Settings
        function loadSettings() {
            const savedTheme = localStorage.getItem('neoai_theme');
            if (savedTheme) {
                currentTheme = savedTheme;
                document.body.dataset.theme = savedTheme;
            }
        }

        function saveSettings() {
            apiKey = apiKeyInput.value;
            localStorage.setItem('neoai_api_key', apiKey);
            settingsModal.classList.remove('show');
            showNotification('Settings saved!', 'success');
        }

        // Notifications
        function showNotification(message, type = 'info') {
            notification.textContent = message;
            notification.className = `notification show ${type}`;
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Auto-scroll
        function autoScroll() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Mobile responsiveness
        window.addEventListener('resize', () => {
            if (window.innerWidth < 768) {
                sidebar.classList.remove('expanded');
            }
        });
    </script>
</body>
</html>
